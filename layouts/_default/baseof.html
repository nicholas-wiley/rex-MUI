<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Title }} — ReX</title>

  <!-- Material Web via ESM CDN -->
  <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.run/@material/web/"
      }
    }
  </script>
  <script type="module">
    import 'https://esm.run/@material/web/all.js';
  </script>

  <!-- Material Symbols font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <!-- Inter + IBM Plex Mono (ReX brand fonts) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      /* Spacing tokens — override in theme/rex-theme.css */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 16px;
      --space-4: 24px;
      --space-5: 32px;
      --space-6: 48px;
    }

    body {
      margin: 0;
      font-family: Roboto, sans-serif;
      background: var(--md-sys-color-background, #fff);
      color: var(--md-sys-color-on-background, #1c1b1f);
    }
  </style>
  <link rel="stylesheet" href="{{ "css/rex-theme.css" | relURL }}" />

  {{ block "head" . }}{{ end }}
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">
  {{ partial "header-tenant.html" . }}
  {{ block "main" . }}{{ end }}
  {{ partial "footer.html" . }}
</body>
</html>
