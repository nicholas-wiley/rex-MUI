<header style="background: #fff; {{ if eq .Params.step 1 }}border-bottom: 1px solid var(--rex-color-gray-light);{{ end }} padding: 0 var(--space-4); height: 88px; display: flex; align-items: center; justify-content: space-between;">
  <a href="{{ "/" | absURL }}" style="display: flex; align-items: center;">
    <img src="{{ .Site.Params.tenantLogo | absURL }}" alt="Wiley" style="width: 134px; height: 28px; object-fit: contain;" />
  </a>
  <nav style="display: flex; align-items: center; gap: var(--space-4); font-size: var(--rex-font-text-size); font-family: var(--rex-font-family); font-weight: var(--rex-font-button-weight);">
    <a href="#" class="rex-nav-link">My submissions</a>
    <div style="position: relative;">
      <button id="user-menu-anchor" onclick="document.getElementById('user-menu').open = !document.getElementById('user-menu').open"
        style="display: flex; align-items: center; gap: var(--space-3); background: none; border: none; cursor: pointer; font-size: var(--rex-font-text-size); font-family: var(--rex-font-family); font-weight: var(--rex-font-button-weight); padding: 0;">
        {{ .Site.Params.userName }}
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0;">
          <path d="M7.97251 11.8659C7.78914 11.8669 7.60736 11.8318 7.43759 11.7624C7.26783 11.6931 7.11342 11.5909 6.98323 11.4618L1.40978 5.88835C1.27986 5.75844 1.17681 5.6042 1.1065 5.43446C1.03619 5.26472 1 5.08279 1 4.89906C1 4.71534 1.03619 4.53341 1.1065 4.36366C1.17681 4.19392 1.27986 4.03969 1.40978 3.90978C1.53969 3.77986 1.69392 3.67681 1.86367 3.6065C2.03341 3.53619 2.21534 3.5 2.39906 3.5C2.58279 3.5 2.76472 3.53619 2.93446 3.6065C3.10421 3.67681 3.25844 3.77986 3.38835 3.90978L7.97251 8.5218L12.5706 4.09091C12.6988 3.94839 12.855 3.83384 13.0295 3.75444C13.2039 3.67503 13.3929 3.63249 13.5846 3.62945C13.7762 3.62641 13.9665 3.66295 14.1433 3.73679C14.3202 3.81062 14.48 3.92017 14.6126 4.05856C14.7453 4.19696 14.8479 4.36123 14.9141 4.5411C14.9804 4.72098 15.0088 4.91259 14.9976 5.10395C14.9864 5.2953 14.9359 5.4823 14.8491 5.65323C14.7624 5.82416 14.6413 5.97535 14.4935 6.09735L8.92 11.4757C8.66519 11.7214 8.32643 11.8609 7.97251 11.8659Z" fill="currentColor"/>
        </svg>
      </button>
      <md-menu id="user-menu" anchor="user-menu-anchor" anchor-corner="end-start" menu-corner="start-start">
        <md-menu-item href="#"><div slot="headline">My Profile</div></md-menu-item>
        <md-menu-item href="#"><div slot="headline">My ORCID ID</div></md-menu-item>
        <md-menu-item href="#"><div slot="headline">Help</div></md-menu-item>
        <md-menu-item href="#"><div slot="headline">Logout</div></md-menu-item>
      </md-menu>
    </div>
  </nav>
</header>
