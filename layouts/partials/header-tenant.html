<header style="background: #fff; {{ if eq .Params.step 1 }}border-bottom: 1px solid var(--rex-color-gray-light);{{ end }}">
<div class="centered large" style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; height: 88px;">
  <a href="{{ "/" | relURL }}" style="display: flex; align-items: center;">
    <img src="{{ .Site.Params.tenantLogo | relURL }}" alt="Wiley" style="width: 134px; height: 28px; object-fit: contain;" />
  </a>
  <nav style="display: flex; align-items: center; gap: var(--space-4); font-size: var(--rex-font-text-size); font-family: var(--rex-font-family); font-weight: var(--rex-font-button-weight);">
    <a href="#" class="header-tenant__link">My submissions</a>
    <div style="position: relative;">
      <button id="user-menu-anchor" onclick="document.getElementById('user-menu').open = !document.getElementById('user-menu').open"
        class="header-tenant__user-btn" style="display: flex; align-items: center; gap: var(--space-3); background: none; border: none; cursor: pointer; padding: 0;">
        {{ .Site.Params.userName }}
        {{ partial "icons/chevron.html" . }}
      </button>
      <md-menu id="user-menu" anchor="user-menu-anchor" anchor-corner="end-start" menu-corner="start-start">
        <md-menu-item href="#"><div slot="headline">My Profile</div></md-menu-item>
        <md-menu-item href="#"><div slot="headline">My ORCID ID</div></md-menu-item>
        <md-menu-item href="#"><div slot="headline">Help</div></md-menu-item>
        <md-menu-item href="#"><div slot="headline">Logout</div></md-menu-item>
      </md-menu>
    </div>
  </nav>
</div>
</header>
